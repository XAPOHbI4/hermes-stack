mcp_servers:
  hermes-local-memory:
    command: /root/hermes/runtime/memory-local/.venv/bin/python
    args:
    - /root/.hermes/profiles/backend/scripts/memory_mcp_server.py
    enabled: true
    env:
      HERMES_HOME: /root/.hermes/profiles/backend
  linear:
    url: https://mcp.linear.app/mcp
    auth: oauth
    enabled: false
    auth_required: OAuth with Linear account; enable after manual auth
  sequential-thinking:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_packages__mcp-server-sequential-thinking
    args: []
    enabled: true
  web-fetch:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_fetch__mcp-server-fetch
    args: []
    enabled: true
  time:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_time__mcp-server-time
    args: []
    enabled: true
  filesystem-hermes:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_packages__mcp-server-filesystem
    args:
    - /root/hermes
    - /root/.hermes
    enabled: true
  git-hermes:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_git__mcp-server-git
    args: []
    enabled: true
    note: Installed MCP git server. Tools accept repo_path; use /root/hermes/runtime/external-repos/* or profile repos.
  codex-plus-hermes-team:
    command: /root/hermes/runtime/bin/external-github/codex-plus-hermes-team
    args:
    - serve
    enabled: false
    note: MCP bridge for Codex/other clients to call Hermes team. Installed and configured; disabled inside Hermes to avoid
      self-loop.
  context7:
    command: /root/hermes/runtime/bin/external-github/upstash__context7-mcp
    args: []
    enabled: true
    description: 'Context7 MCP: up-to-date library/framework documentation from Upstash Context7'
  notion:
    command: /root/hermes/runtime/bin/notion-mcp-hermes
    args: []
    enabled: false
    note: 'Uses /root/hermes/runtime/secrets/notion.env via wrapper; no token stored in YAML. Disabled on xorek server: NOTION_TOKEN/NOTION_API_KEY
      is not configured.'
kanban:
  dispatch_in_gateway: false
  dispatch_interval_seconds: 60
  failure_limit: 2
  worker_log_rotate_bytes: 2097152
  worker_log_backup_count: 1
  orchestrator_profile: orchestrator
  default_assignee: orchestrator
  max_in_progress_per_profile: 1
  auto_decompose: true
  auto_decompose_per_tick: 3
  dispatch_stale_timeout_seconds: 14400
fallback_providers: []
delegation:
  provider: custom
  base_url: 'https://api.z.ai/api/coding/paas/v4'
  api_key: '${ZAI_API_KEY}'
  api_mode: chat_completions
  model: glm-4.5-air
runtime_notes:
  native_codex_rollout_at: '2026-06-04T17:14:24.626860+00:00'
  native_codex_rollout: Migrated to z.ai GLM (provider custom, coding endpoint) 2026-06-17; Codex retired.
  profile_model_role: support
plugins:
  enabled:
  - hermes-android
mcp:
  servers: {}
telegram_topic_routing:
  chat_id: '__TG_HOME_CHAT__'
  active_entrypoint: orchestrator
  allowed_user_ids:
