    args:
    - /root/.hermes/profiles/backend/scripts/memory_mcp_server.py
    enabled: true
    env:
      HERMES_HOME: /root/.hermes/profiles/backend
  linear:
    url: https://mcp.linear.app/mcp
    auth: oauth
    enabled: false
    note: OAuth completed on server; token stored under /root/.hermes/mcp-tokens.
  sequential-thinking:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_packages__mcp-server-sequential-thinking
    args: []
    enabled: true
  web-fetch:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_fetch__mcp-server-fetch
    args: []
    enabled: true
  time:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_time__mcp-server-time
    args: []
    enabled: true
  filesystem-hermes:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_packages__mcp-server-filesystem
    args:
    - /root/hermes
    - /root/.hermes
    enabled: true
  git-hermes:
    command: /root/hermes/runtime/bin/external-github/modelcontextprotocol__servers_git__mcp-server-git
    args: []
    enabled: true
    note: Installed MCP git server. Tools accept repo_path; use /root/hermes/runtime/external-repos/*
      or profile repos.
  codex-plus-hermes-team:
    command: /root/hermes/runtime/bin/external-github/codex-plus-hermes-team
    args:
    - serve
    enabled: false
    note: MCP bridge for Codex/other clients to call Hermes team. Installed and configured;
      disabled inside Hermes to avoid self-loop.
  context7:
    command: /root/hermes/runtime/bin/external-github/upstash__context7-mcp
    args: []
    enabled: true
    description: 'Context7 MCP: up-to-date library/framework documentation from Upstash
      Context7'
  notion:
    command: /root/hermes/runtime/bin/notion-mcp-hermes
    args: []
    enabled: false
    note: 'Uses /root/hermes/runtime/secrets/notion.env via wrapper; no token stored
      in YAML. Disabled on xorek server: NOTION_TOKEN/NOTION_API_KEY is not configured.'
